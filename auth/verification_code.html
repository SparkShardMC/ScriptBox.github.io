<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="description" content="ScriptBox - Verification">
  <link rel="stylesheet" href="../styles/style.css">
  <title>ScriptBox - Verification</title>
<script src="../scripts/auth.js" defer></script>
  <style>
    body { margin:0; overflow:hidden; background:#000814; font-family:Arial,sans-serif; color:white; }
    header, h1, h3 { position:relative; z-index:10; text-align:center; }
    img { position:absolute; top:0; right:0; width:100px; height:100px; z-index:10; }
    h1,h3 { text-shadow:0 0 10px #00ff99; }

    .verify-box {
      position:relative;
      z-index:10;
      width:350px;
      margin:120px auto;
      text-align:center;
    }

    .code-input {
      width:160px;
      padding:10px;
      font-size:20px;
      text-align:center;
      border:4px solid #00ff99;
      border-radius:6px;
      background:white;
      color:black;
      letter-spacing:4px;
    }

    .send-btn, .confirm-btn {
      margin-top:20px;
      background:red;
      color:white;
      padding:10px 20px;
      border-radius:5px;
      text-decoration:none;
      display:inline-block;
      font-family:sans-serif;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <img src="../assets/logo.png">

  <header>
    <h1>Email Verification</h1>
  </header>

  <h3>Enter the 6‑digit code sent to your email</h3>

  <div class="verify-box">
    <input class="code-input" maxlength="6" placeholder="••••••">

    <div>
      <a class="send-btn">Send Verification Code</a>
    </div>

    <div>
      <a href="../dashboard.html" class="confirm-btn">Confirm</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="../styles/hacker_scene.js"></script>
<script src="../scripts/auth.js"></script>
  <script>
document.addEventListener("DOMContentLoaded", () => {
  const apiBase = "http://localhost:5000";
  const email = localStorage.getItem("email");

  if (!email) return;

  const sendBtn = document.querySelector(".send-btn");
  const verifyBtn = document.querySelector(".confirm-btn");
  const codeInput = document.querySelector("input[type='text']");

  if (sendBtn) {
    sendBtn.addEventListener("click", async () => {
      await fetch(apiBase + "/auth/send-code", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email })
      });
    });
  }

  if (verifyBtn && codeInput) {
    verifyBtn.addEventListener("click", async (e) => {
      e.preventDefault();

      const code = codeInput.value.trim();
      if (!code) return;

      const res = await fetch(apiBase + "/auth/verify-code", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, code })
      });

      const data = await res.json();

      if (data.token) {
        localStorage.setItem("token", data.token);
        window.location.href = "../dashboard.html";
      }
    });
  }
});
</body>
</html>
