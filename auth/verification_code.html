<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="description" content="ScriptBox - Verification">
  <link rel="stylesheet" href="../styles/style.css">
  <title>ScriptBox - Verification</title>

  <style>
    body { margin:0; overflow:hidden; background:#000814; font-family:Arial,sans-serif; color:white; }
    header, h1, h3 { position:relative; z-index:10; text-align:center; }
    img { position:absolute; top:0; right:0; width:100px; height:100px; z-index:10; }
    h1,h3 { text-shadow:0 0 10px #00ff99; }

    .verify-box {
      position:relative;
      z-index:10;
      width:350px;
      margin:120px auto;
      text-align:center;
    }

    .code-input {
      width:160px;
      padding:10px;
      font-size:20px;
      text-align:center;
      border:4px solid #00ff99;
      border-radius:6px;
      background:white;
      color:black;
      letter-spacing:4px;
    }

    .send-btn, .confirm-btn {
      margin-top:20px;
      background:red;
      color:white;
      padding:10px 20px;
      border-radius:5px;
      text-decoration:none;
      display:inline-block;
      font-family:sans-serif;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

  <img src="../assets/logo.png">

  <header>
    <h1>Email Verification</h1>
  </header>

  <h3>Enter the 6‑digit code sent to your email</h3>

  <div class="verify-box">
    <input class="code-input" maxlength="6" placeholder="••••••">

    <div>
      <a class="send-btn">Send Verification Code</a>
    </div>

    <div>
      <a href="../dashboard.html" class="confirm-btn">Confirm</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
  <script src="../styles/hacker_scene.js"></script>

</body>
</html>
